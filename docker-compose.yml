services:
  postgres:
    image: postgres:16
    container_name: goal_tracker_db
    restart: always
    environment:
      POSTGRES_USER: goal_user
      POSTGRES_PASSWORD: goalpassword123
      POSTGRES_DB: goal_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: